name: Generate GIF Assets

on:
  workflow_dispatch:
    inputs:
      input_csv:
        description: Input CSV path
        required: false
        default: Book 2 - GIF Ready.csv
      output_csv:
        description: Output CSV path
        required: false
        default: Book 2 - GIF Ready.generated.csv
      public_base_url:
        description: Public base URL for generated GIF links
        required: false
        default: https://rubioo0.github.io/gym_tracker/
  push:
    branches: [main]
    paths:
      - Book 2 - GIF Ready.csv
      - scripts/ezgif-from-csv.mjs
      - .github/workflows/generate-gif-assets.yml

permissions:
  contents: write

concurrency:
  group: gif-assets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate GIF files and CSV references
        env:
          INPUT_CSV: ${{ github.event.inputs.input_csv || 'Book 2 - GIF Ready.csv' }}
          OUTPUT_CSV: ${{ github.event.inputs.output_csv || 'Book 2 - GIF Ready.generated.csv' }}
          PUBLIC_BASE_URL: ${{ github.event.inputs.public_base_url || 'https://rubioo0.github.io/gym_tracker/' }}
        run: |
          if [ ! -f "$INPUT_CSV" ]; then
            echo "Input CSV not found: $INPUT_CSV"
            echo "Skipping GIF generation."
            exit 0
          fi

          node scripts/ezgif-from-csv.mjs \
            --input "$INPUT_CSV" \
            --output-csv "$OUTPUT_CSV" \
            --output-dir "public/GIF" \
            --csv-link-mode "public-base" \
            --public-base-url "$PUBLIC_BASE_URL" \
            --public-gif-prefix "GIF" \
            --concurrency 1 \
            --retries 1

      - name: Commit generated assets
        run: |
          if git diff --quiet -- "Book 2 - GIF Ready.generated.csv" "public/GIF"; then
            echo "No generated GIF changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Book 2 - GIF Ready.generated.csv" "public/GIF"
          git commit -m "chore(gif): refresh generated assets [skip ci]"
          git push
